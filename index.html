<body>

            class="profile-image"

      <ul class="info-list">
        <li class="info-card">
          <span class="icon">✉</span>
          <div>
            <span class="label">Email</span>
            <a

              id="emailText"

        <li class="info-card">

          <div>

      <a

        href="https://drive.google.com/drive/folders/102Kg7A2C_j6SPiP9JgEl8ZZw0yl4Jnru?usp=sharing"

        <button
          type="button"
          class="action-button main"
          id="copyEmailButton"
        >
          이메일 보내기
        </button>

        <a
          class="action-button sub"
          href="tel:01039132132"
        >
          전화하기
        </a>
      </div>

      <a
        class="github-button"
        href="https://github.com/zzyani"
        target="_blank"
