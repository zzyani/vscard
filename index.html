<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>전수진 | 웹 명함</title>

  <!-- CSS 연결 -->
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <main class="card">
    <section class="content">

      <div class="profile-wrap">
        <div class="profile-ring">
          <img
            class="profile-image"
            src="./me1.jpg"
            alt="전수진 프로필 이미지"
          />
        </div>
      </div>

      <header class="header">
        <h1 class="name">전수진</h1>
        <p class="job">MMORPG Game Planner</p>
        <p class="job-sub">System Design · Content Design · Live Service</p>
      </header>

      <ul class="info-list">
        <li class="info-card">
          <span class="icon">✉</span>
          <div>
            <span class="label">Email</span>
            <a class="value" href="mailto:your@email.com">your@email.com</a>
          </div>
        </li>

        <li class="info-card">
          <span class="icon">☎</span>
          <div>
            <span class="label">Phone</span>
            <a class="value" href="tel:01012345678">010-1234-5678</a>
          </div>
        </li>
      </ul>

      
<!-- 버튼 영역 -->

<div class="button-group">

    <a
        class="action-button main"
        href="mailto:your@email.com">
        이메일 보내기
    </a>

    <a
        class="action-button sub"
        href="tel:01012345678">
        전화하기
    </a>

</div>

    </section>
  </main>

  <!-- JS 연결 -->
  <script src="./script.js"></script>
</body>
</html>
